stages:
  - hygiene

repository_hygiene:
  stage: hygiene
  image: alpine:3.20
  script:
    - test -f .editorconfig
    - test -f .gitattributes
    - test -f .github/CODEOWNERS
    - test -f .github/PULL_REQUEST_TEMPLATE.md
    - test -f .github/ISSUE_TEMPLATE/bug_report.md
    - test -f .github/ISSUE_TEMPLATE/feature_request.md
    - test -f .github/dependabot.yml
    - test -f README.md
    - test -f LICENSE.md
    - test -f AGENTS.md
    - test -f VERTICAL.md
    - test -f CONTRIBUTING.md
    - test -f SECURITY.md
    - test -f SUPPORT.md
    - test -f GOVERNANCE.md
    - test -f CODE_OF_CONDUCT.md
    - test -f ROADMAP.md
    - test -f CHANGELOG.md
    - test -f BACKLOG.md
    - test -f TASK_MANAGER.md
    - test -f docs/README.md
    - test -f docs/documentation-system.md
    - test -f docs/requirements.md
    - test -f docs/architecture.md
    - test -f docs/api.md
    - test -f docs/automation.md
    - test -f docs/quality.md
    - test -f docs/release.md
    - test -f docs/operations.md
    - test -f docs/glossary.md
    - test -f docs/risk-register.md
    - echo "Replace this job with project-specific format, lint, test, build, API contract, and security checks after selecting a stack."
